version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:game.db
      - SERVER_ADDR=0.0.0.0
      - SERVER_PORT=8000
      - JWT_SECRET=your-secret-key
      - LOG_LEVEL=info
    volumes:
      - ./game.db:/app/game.db
    networks:
      - app-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
